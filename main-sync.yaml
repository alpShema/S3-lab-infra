template-file-path: main.yaml
sync-type: CFN_STACK_SYNC

# These tell AWS exactly which stack name and region to target
stack-name: ecs-lab-main
region: eu-central-1

capabilities:
  - CAPABILITY_NAMED_IAM
  - CAPABILITY_AUTO_EXPAND

parameters:
  ProjectName: ecs-lab
  GitHubOrg: alpShema
  GitHubAppRepo: ecs-lab-app
  GitHubBranch: main
  DBName: photodb
  DBUsername: photoapp
