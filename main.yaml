AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Photo Gallery Lab - Single stack.
  Provisions VPC, ECS Fargate cluster, ALB, ECR, CodeDeploy blue/green,
  CodePipeline, EventBridge, GitHub Actions OIDC role,
  S3 image bucket, CloudFront (OAC), and RDS PostgreSQL.

# ---------------------------------------------------------------------------
# Parameters — inputs that can be overridden without changing the template.
# All resource names are derived from ProjectName so everything stays consistent.
# ---------------------------------------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: s3-lab
    Description: Prefix used for all resource names (e.g. s3-lab-vpc, s3-lab-cluster).

  GitHubOrg:
    Type: String
    Default: alpShema
    Description: GitHub username or organization — used to scope the OIDC trust condition.

  GitHubAppRepo:
    Type: String
    Default: S3-lab-app
    Description: GitHub repository name for the application code.

  GitHubBranch:
    Type: String
    Default: main
    Description: Branch allowed to assume the GitHub Actions IAM role via OIDC.

  DBName:
    Type: String
    Default: photodb
    Description: Name of the PostgreSQL database created inside RDS.

  DBUsername:
    Type: String
    Default: photoapp
    Description: Master username for the RDS instance.

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # NETWORK
  # Two public subnets (ALB) and two private subnets (ECS tasks) across two
  # Availability Zones for high availability. ECS tasks never have public IPs —
  # all inbound traffic flows through the ALB.

  # Isolated virtual network that all resources live inside.
  # DNS settings are required for VPC Endpoints to resolve AWS service names privately.
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-vpc
        - Key: Project
          Value: !Ref ProjectName

  # Allows resources in public subnets to send and receive internet traffic.
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-igw
        - Key: Project
          Value: !Ref ProjectName

  # Attaches the Internet Gateway to the VPC — required before any internet routing works.
  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # Public subnet in AZ-a — hosts the ALB and NAT Gateway.
  # MapPublicIpOnLaunch assigns a public IP to resources launched here.
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-public-a
        - Key: Project
          Value: !Ref ProjectName
        - Key: Tier
          Value: public

  # Public subnet in AZ-b — second AZ for ALB multi-AZ availability.
  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-public-b
        - Key: Project
          Value: !Ref ProjectName
        - Key: Tier
          Value: public

  # Private subnet in AZ-a — ECS Fargate tasks run here with no public IP.
  # Outbound internet access goes through NatGatewayA.
  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-private-a
        - Key: Project
          Value: !Ref ProjectName
        - Key: Tier
          Value: private

  # Private subnet in AZ-b — second AZ for ECS task resilience.
  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.4.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-private-b
        - Key: Project
          Value: !Ref ProjectName
        - Key: Tier
          Value: private

  # Route table shared by both public subnets.
  # All outbound traffic (0.0.0.0/0) goes directly to the Internet Gateway.
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-public-rt
        - Key: Project
          Value: !Ref ProjectName

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  # Route table for PrivateSubnetA — no default internet route.
  # All internet-bound traffic uses VPC Endpoints (ECR, S3, CloudWatch Logs).
  PrivateRouteTableA:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-private-rt-a
        - Key: Project
          Value: !Ref ProjectName

  PrivateSubnetARouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTableA

  # Route table for PrivateSubnetB — no default internet route.
  # All internet-bound traffic uses VPC Endpoints (ECR, S3, CloudWatch Logs).
  PrivateRouteTableB:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-private-rt-b
        - Key: Project
          Value: !Ref ProjectName

  PrivateSubnetBRouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTableB

  # ── Security Groups ───────────────────────────────────────────────────────

  # ALB accepts HTTP on port 80 (production traffic) and port 8080 (test traffic
  # used during blue/green deployments to validate the new version before go-live).
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB - inbound HTTP from internet
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP from internet
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-alb-sg
        - Key: Project
          Value: !Ref ProjectName

  # ECS tasks only accept traffic from the ALB — never directly from the internet.
  # Egress on 443 allows tasks to reach ECR and CloudWatch Logs via VPC Endpoints.
  EcsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS Fargate tasks - inbound from ALB only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref AlbSecurityGroup
          Description: From ALB only
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS to ECR endpoints and AWS APIs
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-ecs-sg
        - Key: Project
          Value: !Ref ProjectName

  # Defined as a separate resource to avoid a circular dependency.
  # If ALB egress referenced ECS and ECS ingress referenced ALB in the same resource,
  # CloudFormation cannot determine which to create first.
  AlbToEcsEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref AlbSecurityGroup
      IpProtocol: tcp
      FromPort: 8080
      ToPort: 8080
      DestinationSecurityGroupId: !Ref EcsSecurityGroup
      Description: To ECS tasks only

  # VPC Endpoints accept HTTPS from any resource within the VPC (ECS tasks, RDS, etc.).
  # Scoping to the VPC CIDR is simpler and still prevents all external access.
  VpcEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: VPC Endpoints - inbound HTTPS from within the VPC
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 10.0.0.0/16
          Description: HTTPS from all resources within the VPC
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-vpce-sg
        - Key: Project
          Value: !Ref ProjectName

  # ── VPC Endpoints ─────────────────────────────────────────────────────────
  # VPC Endpoints let ECS tasks reach AWS services privately without going through
  # the NAT Gateway — traffic stays inside the AWS network, improving security
  # and reducing data transfer costs.

  # Allows ECS to pull Docker image layers from ECR privately.
  # PrivateDnsEnabled makes the public ECR hostname resolve to a private IP inside the VPC.
  EcrDkrEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ecr.dkr
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      SecurityGroupIds:
        - !Ref VpcEndpointSecurityGroup

  # Allows ECS to call ECR API operations (auth token, describe repositories) privately.
  EcrApiEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ecr.api
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      SecurityGroupIds:
        - !Ref VpcEndpointSecurityGroup

  # Gateway endpoint for S3 — ECR stores image layers in S3, so this keeps
  # image pulls entirely within the AWS network. Gateway endpoints are free
  # and work by adding entries to the private route tables.
  S3Endpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTableA
        - !Ref PrivateRouteTableB

  # Allows ECS tasks to fetch secrets from Secrets Manager without leaving the VPC.
  # Required because tasks run in private subnets with no internet route.
  SecretsManagerEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.secretsmanager
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      SecurityGroupIds:
        - !Ref VpcEndpointSecurityGroup

  # Allows ECS containers to send logs to CloudWatch Logs privately.
  CloudWatchLogsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.logs
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      SecurityGroupIds:
        - !Ref VpcEndpointSecurityGroup

  # ==========================================================================
  # ECR / LOGGING / IAM ROLES
  # ==========================================================================

  # Container image registry for the application.
  # IMMUTABLE tags prevent any image from being overwritten once pushed —
  # every git SHA tag is permanent, guaranteeing deployment reproducibility.
  # ScanOnPush checks each image for known CVE vulnerabilities automatically.
  # The lifecycle policy keeps only the last 10 images to control storage costs.
  EcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}-app
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep last 10 images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": 10
              },
              "action": { "type": "expire" }
            }]
          }
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # CloudWatch Log Group where container stdout/stderr is sent.
  # RetentionInDays automatically deletes logs older than 14 days to control costs.
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ProjectName}
      RetentionInDays: 14
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Used by the ECS agent (not the application) to pull images from ECR
  # and send logs to CloudWatch. The managed policy grants exactly these permissions.
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-task-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Used by the application code running inside the container.

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-task-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Allows Application Auto Scaling to adjust the ECS service desired count.
  AutoScalingRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-autoscaling-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: application-autoscaling.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceAutoscaleRole
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Auto-generates a secure RDS master password and stores it in Secrets Manager.
  # The task execution role retrieves it at container startup so the password is
  # never stored in environment variables in plain text or in the task definition.
  DBPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${ProjectName}/db-password
      Description: RDS PostgreSQL master password for the photo gallery app
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "${DBUsername}"}'
        GenerateStringKey: password
        ExcludeCharacters: '"@/\'
        PasswordLength: 16
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Adds Secrets Manager read permission to the task execution role.
  # The managed policy already covers ECR and CloudWatch; this extends it for secrets.
  TaskExecutionRoleSecretsPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: SecretsManagerAccess
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: secretsmanager:GetSecretValue
            Resource: !Ref DBPasswordSecret
      Roles:
        - !Ref TaskExecutionRole

  # Allows CodeDeploy to manage the blue/green deployment — register task definitions,
  # update the ECS service, and shift traffic between ALB target groups.
  CodeDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-codedeploy-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codedeploy.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCodeDeployRoleForECS
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ALB / TARGET GROUPS / LISTENERS

  # Internet-facing ALB placed in both public subnets for multi-AZ availability.
  # All user traffic enters here — ECS tasks are never exposed directly.
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${ProjectName}-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Blue target group — holds the currently running (stable) version of the app.
  # TargetType: ip is required for Fargate .
  BlueTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-blue-tg
      Port: 8080
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VPC
      HealthCheckPath: /actuator/health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Green target group — holds the new version during a blue/green deployment.
  # CodeDeploy routes test traffic here first, validates health, then switches production.
  GreenTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-green-tg
      Port: 8080
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VPC
      HealthCheckPath: /actuator/health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Production listener — serves real user traffic on port 80, initially routed to Blue.
  # CodeDeploy switches this to Green after a successful deployment.
  ProdListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref BlueTargetGroup

  # ECS CLUSTER / TASK DEFINITION / SERVICE / AUTO SCALING

  # Logical grouping for ECS tasks. Container Insights enabled for enhanced
  # per-task CPU and memory metrics in CloudWatch.
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${ProjectName}-cluster
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # image, CPU, memory, networking, logging,
  # environment variables, and health check. The image tag 'latest' is used here
  # for the initial stack deployment only.
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectName}-task
      Cpu: "512"
      Memory: "1024"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: !Sub ${ProjectName}-container
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectName}-app:latest
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Essential: true
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          Environment:
            - Name: SERVER_PORT
              Value: "8080"
            - Name: SPRING_PROFILES_ACTIVE
              Value: prod
            - Name: S3_BUCKET
              Value: !Ref ImageBucket
            - Name: CLOUDFRONT_URL
              Value: !Sub https://${CloudFrontDistribution.DomainName}
            - Name: DB_HOST
              Value: !GetAtt RdsInstance.Endpoint.Address
            - Name: DB_PORT
              Value: !GetAtt RdsInstance.Endpoint.Port
            - Name: DB_NAME
              Value: !Ref DBName
            - Name: DB_USERNAME
              Value: !Ref DBUsername
          # DB_PASSWORD is injected at container startup by the task execution role
          # from Secrets Manager — never stored in plain text in the task definition.
          Secrets:
            - Name: DB_PASSWORD
              ValueFrom: !Sub '${DBPasswordSecret}:password::'
          HealthCheck:
            Command:
              - CMD-SHELL
              - "curl -f http://localhost:8080/actuator/health || exit 1"
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Runs and maintains the desired number of tasks, registers them with the ALB,
  # DependsOn ensures both listeners exist before the service registers with the ALB.
  EcsService:
    Type: AWS::ECS::Service
    DependsOn: ProdListener
    Properties:
      ServiceName: !Sub ${ProjectName}-service
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      DeploymentController:
        Type: CODE_DEPLOY
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnetA
            - !Ref PrivateSubnetB
          SecurityGroups:
            - !Ref EcsSecurityGroup
      LoadBalancers:
        - ContainerName: !Sub ${ProjectName}-container
          ContainerPort: 8080
          TargetGroupArn: !Ref BlueTargetGroup
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Registers the ECS service as a scalable target — min 1 task, max 4 tasks.
  ScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 4
      MinCapacity: 1
      ResourceId: !Sub service/${EcsCluster}/${EcsService.Name}
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs
      RoleARN: !GetAtt AutoScalingRole.Arn

  # Scales tasks in/out based on average CPU utilization across all running tasks.
  # Target: 70% CPU — adds tasks when above, removes when below.
  # ScaleOutCooldown is short (60s) to respond quickly to traffic spikes.
  # ScaleInCooldown is longer (300s) to avoid removing tasks too aggressively.
  ScaleOutPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub ${ProjectName}-scale-out
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 70.0
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  # CODEDEPLOY — BLUE/GREEN

  # Registers this as a CodeDeploy application targeting ECS (not EC2 or Lambda).
  CodeDeployApplication:
    Type: AWS::CodeDeploy::Application
    Properties:
      ApplicationName: !Sub ${ProjectName}-deploy-app
      ComputePlatform: ECS
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Defines the blue/green deployment behaviour:
  # - ECSAllAtOnce: shifts 100% of traffic at once (not canary/linear)
  # - TerminationWaitTimeInMinutes: 5 — keeps old (Blue) tasks alive for 5 minutes
  #   after traffic switches to Green, giving time to roll back if issues arise
  # - CONTINUE_DEPLOYMENT: automatically proceeds without waiting for manual approval
  # - ProdTrafficRoute / TestTrafficRoute: links the two ALB listeners so CodeDeploy
  #   knows which carries production vs validation traffic
  CodeDeployDeploymentGroup:
    Type: AWS::CodeDeploy::DeploymentGroup
    Properties:
      ApplicationName: !Ref CodeDeployApplication
      DeploymentGroupName: !Sub ${ProjectName}-dg
      ServiceRoleArn: !GetAtt CodeDeployRole.Arn
      DeploymentConfigName: CodeDeployDefault.ECSAllAtOnce
      DeploymentStyle:
        DeploymentType: BLUE_GREEN
        DeploymentOption: WITH_TRAFFIC_CONTROL
      BlueGreenDeploymentConfiguration:
        TerminateBlueInstancesOnDeploymentSuccess:
          Action: TERMINATE
          TerminationWaitTimeInMinutes: 5
        DeploymentReadyOption:
          ActionOnTimeout: CONTINUE_DEPLOYMENT
          WaitTimeInMinutes: 0
      LoadBalancerInfo:
        TargetGroupPairInfoList:
          - ProdTrafficRoute:
              ListenerArns:
                - !Ref ProdListener
            TargetGroups:
              - Name: !GetAtt BlueTargetGroup.TargetGroupName
              - Name: !GetAtt GreenTargetGroup.TargetGroupName
      ECSServices:
        - ClusterName: !Ref EcsCluster
          ServiceName: !GetAtt EcsService.Name
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # PIPELINE — S3 ARTIFACT BUCKET + IAM ROLES + CODEPIPELINE + EVENTBRIDGE

  # S3 bucket that holds artifacts.zip (taskdef.json + imageDetail.json + appspec.yaml).
  # Versioning is required by CodePipeline's S3 source action to detect new uploads.
  # All public access is blocked. Old artifact versions are deleted after 30 days.
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-artifacts-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldArtifacts
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Bucket policy with three rules:
  #  Deny all access over plain HTTP (enforce HTTPS only)
  # Allow CodePipeline role to read artifacts during pipeline execution
  # Allow GitHub Actions role to upload artifacts.zip after building the image
  ArtifactBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ArtifactBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSSLOnly
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt ArtifactBucket.Arn
              - !Sub ${ArtifactBucket.Arn}/*
            Condition:
              Bool:
                'aws:SecureTransport': false
          - Sid: AllowCodePipeline
            Effect: Allow
            Principal:
              AWS: !GetAtt CodePipelineRole.Arn
            Action:
              - s3:GetObject
              - s3:GetObjectVersion
              - s3:GetBucketVersioning
              - s3:PutObject
              - s3:ListBucket
            Resource:
              - !GetAtt ArtifactBucket.Arn
              - !Sub ${ArtifactBucket.Arn}/*
          - Sid: AllowGitHubActionsRole
            Effect: Allow
            Principal:
              AWS: !GetAtt GitHubActionsRole.Arn
            Action:
              - s3:PutObject
              - s3:GetObject
            Resource: !Sub ${ArtifactBucket.Arn}/*

  # IAM role assumed by GitHub Actions via OIDC — no long-lived AWS credentials needed.
 
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-github-actions-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                'token.actions.githubusercontent.com:aud': sts.amazonaws.com
              StringLike:
                'token.actions.githubusercontent.com:sub':
                  !Sub 'repo:${GitHubOrg}/${GitHubAppRepo}:ref:refs/heads/${GitHubBranch}'
      Policies:
        - PolicyName: ECRAndS3Policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ECRAuth
                Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: '*'
              - Sid: ECRPush
                Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:CompleteLayerUpload
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:UploadLayerPart
                  - ecr:DescribeImages
                  - ecr:DescribeRepositories
                Resource: !GetAtt EcrRepository.Arn
              - Sid: S3ArtifactUpload
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub ${ArtifactBucket.Arn}/*
              - Sid: PipelineTrigger
                Effect: Allow
                Action: codepipeline:StartPipelineExecution
                Resource: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${ProjectName}-pipeline
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Service role used by CodePipeline to access other AWS services during execution.
 
  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-codepipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: S3Access
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                Resource: !Sub ${ArtifactBucket.Arn}/*
              - Sid: S3BucketAccess
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketVersioning
                Resource: !GetAtt ArtifactBucket.Arn
              - Sid: CodeDeployAccess
                Effect: Allow
                Action:
                  - codedeploy:CreateDeployment
                  - codedeploy:GetDeployment
                  - codedeploy:GetDeploymentConfig
                  - codedeploy:GetApplication
                  - codedeploy:GetApplicationRevision
                  - codedeploy:RegisterApplicationRevision
                  - codedeploy:GetDeploymentGroup
                Resource: '*'
              - Sid: ECSAccess
                Effect: Allow
                Action:
                  - ecs:DescribeServices
                  - ecs:DescribeTaskDefinition
                  - ecs:RegisterTaskDefinition
                Resource: '*'
              - Sid: PassRole
                Effect: Allow
                Action: iam:PassRole
                Resource: '*'
                Condition:
                  StringEqualsIfExists:
                    'iam:PassedToService':
                      - ecs-tasks.amazonaws.com
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Allows EventBridge to call StartPipelineExecution when an ECR push event fires.
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-eventbridge-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StartPipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: codepipeline:StartPipelineExecution
                Resource: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${Pipeline}
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Two-stage pipeline:
  # Stage 1 (Source): reads artifacts.zip from S3. 
  # Stage 2 (Deploy): calls CodeDeployToECS. 
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub ${ProjectName}-pipeline
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: ImageDefinitions
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: S3
                Version: '1'
              Configuration:
                S3Bucket: !Ref ArtifactBucket
                S3ObjectKey: artifacts.zip
                PollForSourceChanges: 'false'
              OutputArtifacts:
                - Name: SourceArtifact
              RunOrder: 1
        - Name: Deploy
          Actions:
            - Name: BlueGreenDeploy
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CodeDeployToECS
                Version: '1'
              Configuration:
                ApplicationName: !Ref CodeDeployApplication
                DeploymentGroupName: !Ref CodeDeployDeploymentGroup
                TaskDefinitionTemplateArtifact: SourceArtifact
                AppSpecTemplateArtifact: SourceArtifact
                Image1ArtifactName: SourceArtifact
                Image1ContainerName: IMAGE1_NAME
              InputArtifacts:
                - Name: SourceArtifact
              RunOrder: 1
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # EventBridge rule that watches for successful image pushes to the ECR repository.
  # This provides an automatic trigger in addition to the explicit pipeline start
  # called by the GitHub Actions workflow after uploading artifacts.zip.
  EcrPushEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub ${ProjectName}-ecr-push-rule
      Description: Trigger CodePipeline on ECR image push
      EventPattern:
        source:
          - aws.ecr
        detail-type:
          - ECR Image Action
        detail:
          action-type:
            - PUSH
          result:
            - SUCCESS
          repository-name:
            - !Ref EcrRepository
      State: ENABLED
      Targets:
        - Id: TriggerPipeline
          Arn: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${Pipeline}
          RoleArn: !GetAtt EventBridgeRole.Arn

  # ==========================================================================
  # S3 IMAGE BUCKET + CLOUDFRONT
  # ==========================================================================

  # S3 bucket where the application stores uploaded photos.
  # All public access is blocked — images are served exclusively through CloudFront.
  # Objects transition to S3-IA after 90 days to reduce storage costs.
  ImageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-images-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - TransitionInDays: 90
                StorageClass: STANDARD_IA
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Origin Access Control — replaces the older OAI approach.
  # Only CloudFront distributions that reference this OAC can read from the S3 bucket.
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${ProjectName}-oac
        Description: OAC for photo gallery S3 origin
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront distribution caches and serves photos globally.
  # Price Class 200 covers North America, Europe, and Asia (excludes South America/Australia).
  # HTTP is redirected to HTTPS; the CachingOptimized managed policy sets sensible TTLs.
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - Id: S3ImageOrigin
            DomainName: !GetAtt ImageBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3ImageOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          # AWS managed CachingOptimized policy — 24h default TTL, gzip/brotli enabled
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        Enabled: true
        PriceClass: PriceClass_200
        HttpVersion: http2
        Comment: !Sub ${ProjectName} photo gallery
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # Bucket policy with two rules:
  # 1. Allow CloudFront (via OAC) to read any object — required for serving images.
  # 2. Deny all access over plain HTTP to enforce encryption in transit.
  ImageBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ImageBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOACRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${ImageBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}
          - Sid: DenyHTTP
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt ImageBucket.Arn
              - !Sub ${ImageBucket.Arn}/*
            Condition:
              Bool:
                'aws:SecureTransport': false

  # Inline policy on the task role — allows the application code to upload, read, and delete photos.
  TaskRoleS3Policy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: S3ImageAccess
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:DeleteObject
            Resource: !Sub ${ImageBucket.Arn}/*
          - Effect: Allow
            Action: s3:ListBucket
            Resource: !GetAtt ImageBucket.Arn
      Roles:
        - !Ref TaskRole

  # Allows the app to invalidate CloudFront cache when a photo is deleted.
  TaskRoleCloudFrontPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: CloudFrontInvalidation
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action: cloudfront:CreateInvalidation
            Resource: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}
      Roles:
        - !Ref TaskRole

  # ==========================================================================
  # RDS POSTGRESQL
  # ==========================================================================

  # RDS security group: only accepts connections on port 5432 from ECS tasks.
  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS PostgreSQL - inbound from ECS tasks only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref EcsSecurityGroup
          Description: From ECS tasks only
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-rds-sg
        - Key: Project
          Value: !Ref ProjectName

  # Adds port 5432 egress to the ECS security group as a separate resource
  # to avoid the circular dependency: ECS SG references RDS SG and RDS SG references ECS SG.
  EcsToRdsEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref EcsSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      DestinationSecurityGroupId: !Ref RdsSecurityGroup
      Description: To RDS PostgreSQL

  # Subnet group spanning both private subnets.
  # RDS requires at least two AZs in the subnet group even when MultiAZ is disabled.
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private subnets for the photo gallery RDS instance
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # PostgreSQL 16 instance in private subnets — never publicly accessible.
  # MultiAZ is disabled to reduce lab costs; enable for production workloads.
  # DeletionPolicy: Delete allows the stack to be cleanly torn down after the lab.
  RdsInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DBInstanceIdentifier: !Sub ${ProjectName}-db
      DBName: !Ref DBName
      Engine: postgres
      EngineVersion: '16.9'
      DBInstanceClass: db.t3.micro
      AllocatedStorage: '20'
      StorageType: gp2
      StorageEncrypted: true
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DBPasswordSecret}:SecretString:password}}'
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RdsSecurityGroup
      MultiAZ: false
      PubliclyAccessible: false
      BackupRetentionPeriod: 1  # 1 day is sufficient for a lab; increase to 7+ for production
      DeletionProtection: false
      Tags:
        - Key: Project
          Value: !Ref ProjectName

# ---------------------------------------------------------------------------
# Outputs — values exported from the stack for use in GitHub repo variables
# and by the GitHub Actions workflow at runtime.
# ---------------------------------------------------------------------------
Outputs:
  AlbEndpoint:
    Description: Application URL — open this to see the live app.
    Value: !Sub http://${ALB.DNSName}

  GitHubActionsRoleArn:
    Description: Set as AWS_ROLE_ARN variable in the ecs-lab-app GitHub repo.
    Value: !GetAtt GitHubActionsRole.Arn

  ArtifactBucketName:
    Description: Set as PIPELINE_ARTIFACT_BUCKET variable in the ecs-lab-app GitHub repo.
    Value: !Ref ArtifactBucket

  TaskExecutionRoleArn:
    Description: Read by the GitHub Actions workflow to build taskdef.json.
    Value: !GetAtt TaskExecutionRole.Arn

  TaskRoleArn:
    Description: Read by the GitHub Actions workflow to build taskdef.json.
    Value: !GetAtt TaskRole.Arn

  EcrRepositoryUri:
    Description: ECR registry URI — the destination for docker push.
    Value: !GetAtt EcrRepository.RepositoryUri

  PipelineUrl:
    Description: Direct link to the CodePipeline dashboard.
    Value: !Sub https://${AWS::Region}.console.aws.amazon.com/codesuite/codepipeline/pipelines/${Pipeline}/view

  ImageBucketName:
    Description: S3 bucket where the app stores uploaded photos. Set as S3_BUCKET variable in the app repo.
    Value: !Ref ImageBucket

  CloudFrontUrl:
    Description: CloudFront URL for serving images. Set as CLOUDFRONT_URL variable in the app repo.
    Value: !Sub https://${CloudFrontDistribution.DomainName}

  CloudFrontDistributionId:
    Description: CloudFront distribution ID — needed for cache invalidations on photo delete.
    Value: !Ref CloudFrontDistribution

  RdsEndpoint:
    Description: RDS hostname — passed to the app as DB_HOST.
    Value: !GetAtt RdsInstance.Endpoint.Address

  DBSecretArn:
    Description: Secrets Manager ARN holding the RDS master password.
    Value: !Ref DBPasswordSecret
